apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: system-addon
spec:
  releaseName: traefik
  interval: 5m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  values:
    service:
      type: LoadBalancer
      externalTrafficPolicy: Local
      annotations:
        metallb.io/ip-allocated-from-pool: generic-cluster-pool
        metallb.universe.tf/address-pool: generic-cluster-pool
    ingressRoute:
      dashboard:
        enabled: true
    additionalArguments:
      - '--log.level=INFO'
      - '--providers.kubernetesingress=false'
    providers:
      kubernetesGateway:
        enabled: true
    gateway:
      namespacePolicy: All
    ports:
      web:
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
        forwardedHeaders:
          trustedIPs:
            - 173.245.48.0/20
            - 103.21.244.0/22
            - 103.22.200.0/22
            - 103.31.4.0/22
            - 141.101.64.0/18
            - 108.162.192.0/18
            - 190.93.240.0/20
            - 188.114.96.0/20
            - 197.234.240.0/22
            - 198.41.128.0/17
            - 162.158.0.0/15
            - 104.16.0.0/13
            - 104.24.0.0/14
            - 172.64.0.0/13
            - 131.0.72.0/22
    api:
      dashboard: true
    logs:
      access:
        enabled: true
        format: json