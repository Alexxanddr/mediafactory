apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
  namespace: extra-tools
spec:
  interval: 5m
  chart:
    spec:
      chart: open-webui
      sourceRef:
        kind: HelmRepository
        name: open-webui
        namespace: flux-system
  install:
    createNamespace: true
  values:
    ollama:
      enabled: false
    pipelines:
      enabled: false
    websocket:
      enabled: true
      redis:
        enabled: false
    persistence:
      enabled: true
      size: 5Gi
      existingClaim: open-webui-config
    ollamaUrlsFromExtraEnv: true
    extraEnvFrom:
      - secretRef:
          name: ollama-secrets
