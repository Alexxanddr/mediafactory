apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: komga-config
  namespace: multimedia-factory
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  storageClassName: local-path
  volumeMode: Filesystem
  volumeName: komga-config

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: komga-data
  namespace: multimedia-factory
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  storageClassName: local-path
  volumeMode: Filesystem
  volumeName: komga-data

---
