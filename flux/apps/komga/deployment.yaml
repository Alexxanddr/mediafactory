apiVersion: apps/v1
kind: Deployment
metadata:
  name: komga
  namespace: multimedia-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: komga
  template:
    metadata:
      labels:
        app: komga
    spec:
      containers:
        - name: komga
          image: gotson/komga:latest
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Etc/UTC
          ports:
            - containerPort: 25600
          volumeMounts:
            - name: komga-config
              mountPath: /config
            - name: komga-data
              mountPath: /data
      volumes:
        - name: komga-config
          persistentVolumeClaim:
            claimName: komga-config
        - name: komga-data
          persistentVolumeClaim:
            claimName: komga-data
