apiVersion: v1
kind: Service
metadata:
  name: dispatcharr-postgres
  namespace: multimedia-factory
spec:
  selector:
    app: dispatcharr-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: dispatcharr-redis
  namespace: multimedia-factory
spec:
  selector:
    app: dispatcharr-redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: dispatcharr-web
  namespace: multimedia-factory
spec:
  selector:
    app: dispatcharr-web
  ports:
    - port: 9191
      targetPort: 9191