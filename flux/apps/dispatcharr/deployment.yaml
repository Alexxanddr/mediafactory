apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatcharr-postgres
  namespace: multimedia-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dispatcharr-postgres
  template:
    metadata:
      labels:
        app: dispatcharr-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: dispatcharr-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: dispatcharr-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dispatcharr-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: dispatcharr-postgres
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "dispatch", "-d", "dispatcharr"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: dispatcharr-postgres
          persistentVolumeClaim:
            claimName: dispatcharr-postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatcharr-redis
  namespace: multimedia-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dispatcharr-redis
  template:
    metadata:
      labels:
        app: dispatcharr-redis
    spec:
      containers:
        - name: redis
          image: redis:latest
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dispatcharr-redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatcharr-web
  namespace: multimedia-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dispatcharr-web
  template:
    metadata:
      labels:
        app: dispatcharr-web
    spec:
      containers:
        - name: web
          image: ghcr.io/dispatcharr/dispatcharr:latest
          ports:
            - containerPort: 9191
          env:
            - name: DISPATCHARR_ENV
              value: modular
            - name: POSTGRES_HOST
              value: dispatcharr-postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: dispatcharr-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: dispatcharr-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dispatcharr-secrets
                  key: POSTGRES_PASSWORD
            - name: REDIS_HOST
              value: dispatcharr-redis
            - name: REDIS_PORT
              value: "6379"
            - name: DISPATCHARR_LOG_LEVEL
              value: info
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: 9191
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dispatcharr-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery
  namespace: multimedia-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery
  template:
    metadata:
      labels:
        app: celery
    spec:
      containers:
        - name: celery
          image: ghcr.io/dispatcharr/dispatcharr:latest
          command: ["/app/docker/entrypoint.celery.sh"]
          env:
            - name: DISPATCHARR_ENV
              value: modular
            - name: DISPATCHARR_PORT
              value: "9191"
            - name: POSTGRES_HOST
              value: dispatcharr-postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: dispatcharr-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: dispatcharr-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dispatcharr-secrets
                  key: POSTGRES_PASSWORD
            - name: REDIS_HOST
              value: dispatcharr-redis
            - name: REDIS_PORT
              value: "6379"
            - name: DISPATCHARR_LOG_LEVEL
              value: info
            - name: DJANGO_SETTINGS_MODULE
              value: dispatcharr.settings
            - name: PYTHONUNBUFFERED
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dispatcharr-data
