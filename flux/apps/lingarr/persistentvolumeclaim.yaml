---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lingarr-config
  namespace: multimedia-factory
spec:
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  storageClassName: local-path
  volumeMode: Filesystem
  volumeName: lingarr-config
