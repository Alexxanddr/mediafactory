apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kavita-config
  namespace: multimedia-factory
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  storageClassName: local-path
  volumeMode: Filesystem
  volumeName: kavita-config

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kavita-data
  namespace: multimedia-factory
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  storageClassName: local-path
  volumeMode: Filesystem
  volumeName: kavita-data

---
