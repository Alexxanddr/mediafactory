apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracearr-redis
  namespace: multimedia-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tracearr-redis
  template:
    metadata:
      labels:
        app: tracearr-redis
    spec:
      containers:
        - name: redis
          image: redis:8-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tracearr-redis-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracearr
  namespace: multimedia-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tracearr
  template:
    metadata:
      labels:
        app: tracearr
    spec:
      containers:
        - name: tracearr
          image: ghcr.io/connorgallopo/tracearr:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOST
              value: "0.0.0.0"
            - name: TZ
              value: UTC
            - name: REDIS_URL
              value: redis://redis:6379
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tracearr-secret
                  key: JWT_SECRET
            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: tracearr-secret
                  key: COOKIE_SECRET
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tracearr-secret
                  key: DB_PASSWORD
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tracearr-secret
                  key: DATABASE_URL
          volumeMounts:
            - name: backup
              mountPath: /data/backup
      volumes:
        - name: backup
          persistentVolumeClaim:
            claimName: tracearr-config