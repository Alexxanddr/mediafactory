---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: system-addon
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      securityContext:
        sysctls:
          # Permette traffico ICMP (ping, traceroute) verso le risorse dietro cloudflared.
          - name: net.ipv4.ping_group_range
            value: "65532 65532"
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:latest
        command:
        - cloudflared
        - tunnel
        - --no-autoupdate
        - --loglevel
        - info
        - --metrics
        - 0.0.0.0:2000
        - --config
        - /etc/cloudflared/config/config.yaml
        - run
        livenessProbe:
          httpGet:
            # Cloudflared espone /ready che risponde 200 solo se ha una connessione attiva
            # verso la rete di Cloudflare.
            path: /ready
            port: 2000
          failureThreshold: 1
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - name: config
          mountPath: /etc/cloudflared/config
          readOnly: true
        - name: cert
          mountPath: /etc/cloudflared/cert.pem
          readOnly: true
          subPath: cert.pem
        - name: creds
          mountPath: /etc/cloudflared/creds
          readOnly: true
      volumes:
      - name: creds
        secret:
          secretName: tunnel-credentials
      - name: cert
        secret:
          secretName: cert-credentials
      - name: config
        configMap:
          name: cloudflared
          items:
          - key: config.yaml
            path: config.yaml