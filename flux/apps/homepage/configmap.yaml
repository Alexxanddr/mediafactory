apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: multimedia-factory
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    # providers:
    #   openweathermap: openweathermapapikey
    quicklaunch:
      searchDescriptions: true
      hideInternetSearch: true
      showSearchSuggestions: true
      hideVisitURL: true
      provider: google # google, duckduckgo, bing, baidu, brave or custom

    cardBlur: sm
    useEqualHeights: true
    hideErrors: falses
    disableCollapse: true
    hideVersion: false
    showStats: true
    headerStyle: boxed
    disableUpdateCheck: false

    layout:
      Arr Stack:
        header: true
        style: row
        columns: 5
      OtherArr:
        header: false
        style: row
        columns: 4
      Media Stack:
        style: row
        columns: 5
      Infra Stack:
        style: row
        columns: 4
      OtherInfra:
        header: false
        style: row
        columns: 3

      Tools:
        style: row
        columns: 5
      OtherTools:
        header: false
        style: row
        columns: 3
  custom.css: ""
  custom.js: ""
  # docker.yaml: ""
  bookmarks.yaml: ""
  services.yaml: |
    - Arr Stack:
        - Radarr:
            icon: radarr.png
            href: https://radarr.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
            description: Movies, Docs all 1080
            showStats: false
            namespace: multimedia-factory
            siteMonitor:  http://radarr.multimedia-factory.svc:7878
            app: radarr
            podSelector: app in ( radarr )
            widget:
              type: radarr
              url: http://radarr.multimedia-factory.svc:7878
              key: {{HOMEPAGE_VAR_RADARR_API}}
              enableQueue: false
        - Sonarr:
            icon: sonarr.png
            href: https://sonarr.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
            description: Series management
            showStats: false
            siteMonitor: http://sonarr.multimedia-factory.svc:8989
            app: sonarr
            namespace: multimedia-factory
            podSelector: app in ( sonarr )
            widget:
              type: sonarr
              url: http://sonarr.multimedia-factory.svc:8989
              key: {{HOMEPAGE_VAR_SONARR_API}}
              enableQueue: false
        - Prowlarr:
            icon: prowlarr.png
            href: https://prowlarr.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
            description: Movies, Docs all 1080
            showStats: false
            siteMonitor: http://prowlarr.multimedia-factory.svc:9696
            app: prowlarr
            namespace: multimedia-factory
            podSelector: app in ( prowlarr )
            widget:
              type: prowlarr
              url: http://prowlarr.multimedia-factory.svc:9696
              key: {{HOMEPAGE_VAR_PROWLARR_API}}
              enableQueue: true
        - Bazarr:
            icon: bazarr.png
            href: https://bazarr.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
            siteMonitor: http://bazarr.multimedia-factory.svc:6767
            description: Series management
            showStats: false
            app: bazarr
            namespace: multimedia-factory
            podSelector: app in ( bazarr )
            widget:
              type: bazarr
              url: http://bazarr.multimedia-factory.svc:6767
              key: {{HOMEPAGE_VAR_BAZARR_API}}
              enableQueue: true
        - Dispatcharr:
            icon: dispatcharr.png
            href: https://dispatcharr.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
            siteMonitor: http://dispatcharr-web.multimedia-factory.svc:9191
            description: DVR TV
            showStats: false
            app: dispatcharr-web
            namespace: multimedia-factory
            podSelector: app in ( dispatcharr-web )
            widget:
              type: dispatcharr
              url: http://dispatcharr-web.multimedia-factory.svc:9191
              username: {{HOMEPAGE_VAR_DISPATCHARR_USER}}
              password: {{HOMEPAGE_VAR_DISPATCHARR_PASS}}
              enableActiveStreams: true # optional, defaults to false
    - OtherArr:
      - Profilarr:
          icon: https://avatars.githubusercontent.com/u/171363348?s=48&v=4
          href: https://profilarr.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
          siteMonitor: http://profilarr.multimedia-factory.svc:6868
          description: Profilarr
          showStats: false
          app: profilarr
          namespace: multimedia-factory
          podSelector: app in ( profilarr )
      - Maintainerr:
          icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/maintainerr.png
          href: https://maintainerr.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
          siteMonitor: http://maintainerr.multimedia-factory.svc:6246
          description: Maintainerr
          showStats: false
          app: maintainerr
          namespace: multimedia-factory
          podSelector: app in ( maintainerr )
      - Lingarr:
          icon: lingarr.png
          href: https://lingarr.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
          siteMonitor: http://lingarr.multimedia-factory.svc:9876
          description: Lingarr
          showStats: false
          app: lingarr  
          namespace: multimedia-factory
          podSelector: app in ( lingarr )
      - AnimeWorld Sonarr:
          icon: https://www.svgrepo.com/show/514661/animeworld.svg
          href: https://animeworld.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
          siteMonitor: http://animeworld.multimedia-factory.svc:5000
          showStats: false
          app: animeworld
          namespace: multimedia-factory
          podSelector: app in ( animeworld )
    - Media Stack:
        - Plex:
            icon: plex.svg
            href: https://plex.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
            siteMonitor: https://plex-media-server.multimedia-factory.svc:32400
            showStats: false
            app: plex-media-server
            namespace: multimedia-factory
            podSelector: app in ( plex-media-server )
            widget:
                type: plex
                url: https://plex-media-server.multimedia-factory.svc:32400
                key: {{HOMEPAGE_VAR_PLEX_API}}
                fields: [ "movies", "tv"]
        - qbittorrent:
            icon: qbittorrent.svg
            href: https://qbittorrent-wg.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
            siteMonitor: http://qbittorrent-wg.multimedia-factory.svc:8080
            showStats: false
            app: qbittorrent-wg
            namespace: multimedia-factory
            podSelector: app in ( qbittorrent-wg )
            widget:
              type: qbittorrent
              url: http://qbittorrent-wg.multimedia-factory.svc:8080
              username: {{HOMEPAGE_VAR_QBITTORRENT_USER}}
              password: {{HOMEPAGE_VAR_QBITTORRENT_PASS}}
              enableLeechProgress: true
              enableLeechSize: true
              fields: ["leech", "download", "seed", "upload"]
        - Seerr:
            icon: jellyseerr.svg
            href: https://seerr.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
            siteMonitor: http://seerr.multimedia-factory.svc:5055
            showStats: false
            app: seerr
            namespace: multimedia-factory
            podSelector: app in ( seerr )
            widget:
              type: jellyseerr
              url: http://seerr.multimedia-factory.svc:5055
              key: {{HOMEPAGE_VAR_SEERR_API}}
              fields: ["pending", "approved", "available", "issues"]
        - Tracearr:
            icon: tracearr.svg
            href: https://tracearr.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}/
            siteMonitor: http://tracearr.multimedia-factory.svc:3000
            showStats: false
            app: tracearr
            namespace: multimedia-factory
            podSelector: app in ( tracearr )
            widget:
              type: tracearr
              url: http://tracearr.multimedia-factory.svc:3000
              key: {{HOMEPAGE_VAR_TRACEARR_API}}
              view: both # optional, "summary", "details", or "both", defaults to "details"
              enableUser: true # optional, defaults to false
              showEpisodeNumber: true # optional, defaults to false
              expandOneStreamToTwoRows: false # optional, defaults to true
        - FileFlows:
            icon: fileflows.svg
            href: https://fileflows.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
            siteMonitor: http://fileflows.multimedia-factory.svc:5000
            showStats: false
            app: fileflows
            namespace: multimedia-factory
            podSelector: app in ( fileflows )
            widget:
              type: fileflows
              url: http://fileflows.multimedia-factory.svc:5000
              fields: ["queue", "processing", "processed", "time"]
        - Kavita:
            icon: kavita.svg
            href: https://kavita.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
            siteMonitor: http://kavita.multimedia-factory.svc:5000
            showStats: false
            app: kavita
            namespace: multimedia-factory
            podSelector: app in ( kavita )
            widget:
              type: kavita
              url: http://kavita.multimedia-factory.svc:5000
              username: {{HOMEPAGE_VAR_KAVITA_USER}}
              password: {{HOMEPAGE_VAR_KAVITA_PASSWORD}}
        - BookLore:
            icon: booklore.svg
            href: https://booklore.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
            siteMonitor: http://booklore.multimedia-factory.svc:6060
            showStats: false
            app: booklore
            namespace: multimedia-factory
            podSelector: app in ( booklore )
            widget:
              type: booklore
              url: http://booklore.multimedia-factory.svc:6060
              username: {{HOMEPAGE_VAR_BOOKLORE_USER}}
              password: {{HOMEPAGE_VAR_BOOKLORE_PASSWORD}}
        - YamTrack:
            icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/yamtrack-light.png
            href: https://yamtrack.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
            siteMonitor: http://yamtrack.multimedia-factory.svc:8000
            showStats: false
            app: yamtrack
            namespace: multimedia-factory
            podSelector: app in ( yamtrack )
    - Infra Stack:
        - Ubiquiti:
            icon: unifi.svg
            href: {{HOMEPAGE_VAR_UBIQUITI_HREF}}
            widget:
              type: unifi
              url: {{HOMEPAGE_VAR_UBIQUITI_HREF}}
              username: {{HOMEPAGE_VAR_UBIQUITI_USER}}
              password: {{HOMEPAGE_VAR_UBIQUITI_PASSWORD}}
        - SpeedTest:
            icon: speedtest-tracker.png
            href: https://speedy.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
            siteMonitor: http://speedtest-tracker.extra-tools.svc:80
            showStats: false
            app: speedtest-tracker
            namespace: extra-tools
            podSelector: app in ( speedtest-tracker )
            widget:
              type: speedtest
              url: http://speedtest-tracker.extra-tools.svc:80
              version: 1 # optional, default is 1
              key: {{HOMEPAGE_VAR_SPEEDTEST_API}} # required for version 2
              bitratePrecision: 3 # optional, default is 0
        - Traefik:
            icon: traefik.png
            href: https://traefik.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}/dashboard/
            siteMonitor: http://traefik-dashboard.system-addon.svc:8080/dashboard/
            showStats: false
            app: traefik
            namespace: system-addon
            podSelector: app.kubernetes.io/name in ( traefik )
            widget:
              type: traefik
              url: http://traefik-dashboard.system-addon:8080
              fields: ["routers", "services", "middleware"]
        - Uptime Kuma:
            icon: https://uptimekuma.org/wp-content/uploads/2025/01/Uptime-Kuma-Logo.png
            href: https://uptime-kuma.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
            siteMonitor: http://uptime-kuma.extra-tools.svc:3001
            showStats: false
            app: uptime-kuma
            namespace: extra-tools
            podSelector: app in ( uptime-kuma )
            widget:
              type: uptimekuma
              url: http://uptime-kuma.extra-tools.svc:3001
              slug: k8s
              fields: ["up", "down", "uptime", "incident"]
        - CloudFlare Tunnel:
            icon: https://upload.wikimedia.org/wikipedia/commons/4/4b/Cloudflare_Logo.svg
            href: https://one.dash.cloudflare.com
            showStats: false
            app: cloudflared
            namespace: system-addon
            podSelector: app in ( cloudflared )
            widget:
              type: cloudflared
              accountid: {{HOMEPAGE_VAR_CLOUDFLARED_ACCOUNT_ID}}
              tunnelid: {{HOMEPAGE_VAR_CLOUDFLARED_TUNNEL_ID}}
              key: {{HOMEPAGE_VAR_CLOUDFLARED_API_KEY}}
        - PiHole:
            icon: https://upload.wikimedia.org/wikipedia/commons/0/00/Pi-hole_Logo.png
            href: https://pihole.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}/admin
            showStats: false
            app: pihole
            namespace: extra-tools
            podSelector: app in ( pihole )
            widget:
              type: pihole
              url: http://pihole-web.extra-tools.svc
              version: 6
              key: {{HOMEPAGE_VAR_PIHOLE_PASSWORD}}
    - OtherInfra:
      - Metoro:
          icon: https://metoro.io/static/images/Metoro_16_9.svg
          href: https://us-east.metoro.io/
      - Duplicati.com:
          icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/duplicati.svg
          href: https://app.duplicati.com/app/dashboard
      - Duplicati:
          icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/duplicati.svg
          href: https://duplicati.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
          siteMonitor: http://duplicati.system-addon.svc:8200
          showStats: false
          app: duplicati
          namespace: system-addon
          podSelector: app in ( duplicati )
    - Tools:
        - HomeBridge:
            icon: homebridge.svg
            href: https://homebridge.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
            siteMonitor: http://homebridge.home-automation.svc:8581
            showStats: false
            app: homebridge
            namespace: home-automation
            podSelector: app in ( homebridge )
            widget:
              type: homebridge
              url: http://homebridge.home-automation.svc:8581
              username: {{HOMEPAGE_VAR_HOMEBRIDGE_USER}}
              password: {{HOMEPAGE_VAR_HOMEBRIDGE_PASS}}
              fields: ["updates", "child_bridges"]
        - Spotify Stats:
            icon: https://upload.wikimedia.org/wikipedia/commons/8/84/Spotify_icon.svg
            href: https://spotify.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
            siteMonitor: http://your-spotify-server.extra-tools.svc:8080
            showStats: false
            app: your-spotify-server
            namespace: extra-tools
            podSelector: app in ( your-spotify-server )
            widget:
              type: yourspotify
              url: http://your-spotify-server.extra-tools.svc:8080
              key: {{HOMEPAGE_VAR_SPOTIFY_API}}
              fields: ["songs", "time", "artists"]
              interval: month # optional, defaults to week
        - RomM:
            icon: romm.png
            href: https://romm.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
            siteMonitor: http://romm.gaming.svc:8080
            showStats: false
            app: romm
            namespace: gaming
            podSelector: app in ( romm )
            widget:
              type: romm
              url: http://romm.gaming.svc:8080
              fields: ["platforms", "totalRoms", "saves", "states"]
        - Scrutiny:
            icon: https://github.com/AnalogJ/scrutiny/raw/master/webapp/frontend/src/assets/images/logo/scrutiny-logo-dark.png
            href: https://scrutiny.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
            siteMonitor: http://scrutiny-web.extra-tools.svc:8080
            showStats: false
            app: scrutiny-web
            namespace: extra-tools
            podSelector: app in ( scrutiny-web )
            widget:
              type: scrutiny
              url: http://scrutiny-web.extra-tools.svc:8080
        - Vikunja:
            icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/vikunja.png
            href: https://vikunja.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
            siteMonitor: http://vikunja.extra-tools.svc:3456
            showStats: false
            app: vikunja
            namespace: extra-tools
            podSelector: app.kubernetes.io/name in ( vikunja )
            widget:
              type: vikunja
              url: http://vikunja.extra-tools.svc:3456
              key: {{HOMEPAGE_VAR_VIKUNJA_PASSWORD}}
              enableTaskList: true
              version: 2
    - OtherTools:
      - Questarr:
          icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/questarr.png
          href: https://questarr.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
          siteMonitor: http://questarr.gaming.svc:5000
          showStats: false
          app: questarr
          namespace: gaming
          podSelector: app in ( questarr )
      - File Browser Quantum:
          icon: filebrowser.png
          href: https://filebrowser.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
          siteMonitor: http://filebrowser.extra-tools.svc:80
          showStats: false
          app: filebrowser
          namespace: extra-tools
          podSelector: app in ( filebrowser )
      - Nutify:
          icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/nutify.png
          href: https://nutify.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
          siteMonitor: http://nutify.extra-tools.svc:5050
          showStats: false
          app: nutify
          namespace: extra-tools
          podSelector: app in ( nutify )
  widgets.yaml: |
    - greeting:
        text_size: xl
        text: Alexxanddr's HomeLab
    - openmeteo:
        label: Rome
        latitude: 41.86094060191091, 
        longitude: 12.558304332495656
        timezone: Europe/Berlin # optional
        units: metric # or imperial
        cache: 5 # Time in minutes to cache API responses, to stay within limits
        format: # optional, Intl.NumberFormat options
          maximumFractionDigits: 1
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
        network: default
    - unifi_console:
        url: {{HOMEPAGE_VAR_UBIQUITI_HREF}}
        username: {{HOMEPAGE_VAR_UBIQUITI_USER}}
        password: {{HOMEPAGE_VAR_UBIQUITI_PASSWORD}}
---