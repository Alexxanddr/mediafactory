apiVersion: apps/v1
kind: Deployment
metadata:
  name: steam-headless
  namespace: gaming
spec:
  replicas: 0
  selector:
    matchLabels:
      app: steam-headless
  template:
    metadata:
      labels:
        app: steam-headless
    spec:
      hostNetwork: true
      hostIPC: true
      hostname: steam-headless

      runtimeClassName: nvidia

      securityContext:
        seccompProfile:
          type: Unconfined

      containers:
        - name: steam-headless
          image: josh5/steam-headless:latest

          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: all

          envFrom:
            - secretRef:
                name: steam-headless-secret
            - configMapRef:
                name: steam-headless-config

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - NET_ADMIN
                - SYS_ADMIN
                - SYS_NICE

          volumeMounts:
            - name: home-dir
              mountPath: /home/default
            - name: games-dir
              mountPath: /mnt/games
            - name: x11-socket
              mountPath: /tmp/.X11-unix
            - name: pulse-socket
              mountPath: /tmp/pulse

            # DEVICES (equivalenti docker-compose)
            - name: dev-fuse
              mountPath: /dev/fuse
            - name: dev-uinput
              mountPath: /dev/uinput
            - name: dev-input
              mountPath: /dev/input
              readOnly: true

      volumes:
        - name: home-dir
          persistentVolumeClaim:
            claimName: steam-headless-home

        - name: games-dir
          persistentVolumeClaim:
            claimName: steam-headless-games

        - name: x11-socket
          hostPath:
            path: /tmp/.X11-unix

        - name: pulse-socket
          hostPath:
            path: /tmp/pulse

        - name: dev-input
          hostPath:
            path: /dev/input

        - name: dev-fuse
          hostPath:
            path: /dev/fuse

        - name: dev-uinput
          hostPath:
            path: /dev/uinput