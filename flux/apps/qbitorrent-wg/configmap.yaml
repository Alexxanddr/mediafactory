apiVersion: v1
kind: ConfigMap
metadata:
  name: qbittorrent-wg-custom-init
  namespace: multimedia-factory
data:
  type: |
    oneshot

  up: |
    #!/usr/bin/with-contenv sh

    echo "[custom-init] Starting WireGuard cleanup..."

    if ip link show wg0 >/dev/null 2>&1; then
      echo "[custom-init] wg0 found, cleaning..."

      wg-quick down /config/wireguard/wg0.conf 2>/dev/null || true
      ip link delete wg0 2>/dev/null || true

      echo "[custom-init] wg0 cleaned"
    else
      echo "[custom-init] wg0 not present"
    fi

    echo "[custom-init] Done"
