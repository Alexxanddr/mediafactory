apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent-wg
  namespace: multimedia-factory
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: qbittorrent-wg
  template:
    metadata:
      labels:
        app: qbittorrent-wg
    spec:
      dnsPolicy: None
      hostAliases:
      - hostnames:
        - prowlarr.multimedia-factory.svc.cluster.local
        ip: 10.43.150.43
      dnsConfig:
        nameservers:
          - 9.9.9.9
          - 1.1.1.1
      securityContext:
        sysctls:
          - name: net.ipv4.conf.all.src_valid_mark
            value: "1"
          - name: net.ipv6.conf.all.disable_ipv6
            value: "0"

      containers:
        - name: qbittorrent-wg
          image: trigus42/qbittorrentvpn
          command:
            - sh
            - -c
            - |
              if ip link show wg0 >/dev/null 2>&1; then
                echo "[pre-start] Removing stale wg0..."
                ip link delete wg0 2>/dev/null || true
              fi
              exec /init
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: qbittorrent-wg-secret
          env:
            - name: VPN_TYPE
              value: "wireguard"
            - name: VPN_ENABLED
              value: "yes"
            - name: WEBUI_ALLOWED_NETWORKS
              value: "192.168.0.0/16,10.0.0.0/8,172.16.0.0/16,127.0.0.0/8"
          securityContext:
            capabilities:
              add:
                - NET_ADMIN

          volumeMounts:
            - mountPath: /config
              name: qbittorrent-wg-config
            - mountPath: /data
              name: qbittorrent-wg-data
            - name: wireguard-config
              mountPath: /config/wireguard
              readOnly: true

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "ping -c 1 $(echo $WIREGUARD_ADDRESSES | cut -d'/' -f1)"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 5

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "ping -c 1 $(echo $WIREGUARD_ADDRESSES | cut -d'/' -f1)"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3

      volumes:
        - name: wireguard-config
          secret:
            secretName: qbittorrent-wg-wireguard-conf
        - name: qbittorrent-wg-data
          persistentVolumeClaim:
            claimName: qbittorrent-wg-data
        - name: qbittorrent-wg-config
          persistentVolumeClaim:
            claimName: qbittorrent-wg-config
