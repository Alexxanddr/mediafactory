apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent-wg
  namespace: multimedia-factory
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: qbittorrent-wg
  template:
    metadata:
      labels:
        app: qbittorrent-wg
    spec:
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 9.9.9.9
          - 1.1.1.1
      securityContext:
        sysctls:
          - name: net.ipv4.conf.all.src_valid_mark
            value: "1"
          - name: net.ipv6.conf.all.disable_ipv6
            value: "0"
      initContainers:
        - name: cleanup-wg
          image: busybox
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          command:
            - sh
            - -c
            - |
              echo "[init] Cleaning up existing wg0 interface if present..."
              ip link delete wg0 2>/dev/null || true
              wg-quick down wg0 2>/dev/null || true
      containers:
        - name: qbittorrent-wg
          image: trigus42/qbittorrentvpn
          ports:
            - containerPort: 8080
          envFrom:
          - secretRef:
              name: qbittorrent-wg-secret
          env:
            - name: VPN_TYPE
              value: "wireguard"
            - name: VPN_ENABLED
              value: "yes"
            - name: WEBUI_ALLOWED_NETWORKS
              value: "192.168.0.0/16,10.0.0.0/8,172.16.0.0/16,127.0.0.0/8"
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          volumeMounts:
          - mountPath: /config
            name: qbittorrent-wg-config
          - mountPath: /data
            name: qbittorrent-wg-data
          - name: wireguard-config
            mountPath: /config/wireguard
            readOnly: true
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "ping -c 1 $(echo $WIREGUARD_ADDRESSES | cut -d'/' -f1)"
            initialDelaySeconds: 5
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "ping -c 1 $(echo $WIREGUARD_ADDRESSES | cut -d'/' -f1)"
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
      volumes:
        - name: wireguard-config
          secret:
            secretName: qbittorrent-wg-wireguard-conf
        - name: qbittorrent-wg-data
          persistentVolumeClaim:
            claimName: qbittorrent-wg-data
        - name: qbittorrent-wg-config
          persistentVolumeClaim:
            claimName: qbittorrent-wg-config
