apiVersion: apps/v1
kind: Deployment
metadata:
  name: grimmory-db
  namespace: multimedia-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grimmory-db
  template:
    metadata:
      labels:
        app: grimmory-db
    spec:
      containers:
        - name: mariadb
          image: mariadb:latest
          envFrom:
          - secretRef:
              name: grimmory-db-secret
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mariadb-config
              mountPath: /var/lib/mysql
          livenessProbe:
            exec:
              command:
                - healthcheck.sh
                - --connect
                - --innodb_initialized
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - healthcheck.sh
                - --connect
                - --innodb_initialized
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
      volumes:
        - name: mariadb-config
          persistentVolumeClaim:
            claimName: grimmory-mariadb-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grimmory
  namespace: multimedia-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grimmory
  template:
    metadata:
      labels:
        app: grimmory
    spec:
      enableServiceLinks: false
      containers:
        - name: grimmory
          image: grimmory/grimmory:latest
          envFrom:
            - secretRef:
                name: grimmory-db-secret
          ports:
            - containerPort: 6060
          volumeMounts:
            - name: grimmory-data
              mountPath: /app/data
            - name: grimmory-books
              mountPath: /books
            - name: grimmory-bookdrop
              mountPath: /bookdrop
          livenessProbe:
            exec:
              command:
                - wget
                - -q
                - -O
                - '-'
                - http://localhost:6060/api/v1/healthcheck
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - wget
                - -q
                - -O
                - '-'
                - http://localhost:6060/api/v1/healthcheck
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 5
      volumes:
        - name: grimmory-data
          persistentVolumeClaim:
            claimName: grimmory-data
        - name: grimmory-books
          persistentVolumeClaim:
            claimName: grimmory-books
        - name: grimmory-bookdrop
          persistentVolumeClaim:
            claimName: grimmory-bookdrop
      initContainers:
        - name: wait-for-db
          image: busybox:1.28
          command: ['sh', '-c', 'until nc -z grimmory-db 3306; do echo waiting for db; sleep 2; done;']
